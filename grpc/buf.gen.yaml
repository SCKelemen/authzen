version: v2
# Generated Go + gRPC stubs are written under gen/ and committed to the repo.
# Run with: buf generate  (see README.md / Makefile).
clean: true
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
inputs:
  - directory: proto
